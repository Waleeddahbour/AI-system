
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    image: ai-assessment:dev
    ports:
      - "3000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
     - storage-data:/app/storage



  postgres: 
    image: postgres:17.5
    ports: 
      - 5432:5432
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  storage-data:
  postgres-data:
